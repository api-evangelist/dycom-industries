description: Dycom Industries does not publish a public API rate-limit specification. Any API exchanges
  are partner-contracted and governed by individual SOWs.
notes: No public rate-limit numbers exist. Limits should be confirmed in writing with the partner or
  customer engagement.
sources:
  - https://www.dycomind.com
