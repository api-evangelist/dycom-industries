  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner integration
    scope: contract
    metric: varies
    limit: contact provider
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter and honor Retry-After headers if present.
  - name: Contractual thresholds
    description: Throughput is governed by partner SOW; raise concerns through the engagement contact.
