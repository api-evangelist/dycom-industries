specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Dycom Industries
providerId: dycom-industries
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Telecom
  - Utilities
  - Construction
description: 'FOCUS-aligned FinOps shell for Dycom Industries; no public API billing surface, so meters
  and FOCUS columns describe the expected partner-contract billing pattern only.'
notes: Dycom Industries does not publish public API pricing or billing. Reconcile FOCUS columns against
  actual partner invoices.
sources:
  - https://www.dycomind.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Dycom Industries, Inc.
serviceCategory: Specialty Contracting
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Dycom Industries API
  ServiceCategory: Specialty Contracting
  ProviderName: Dycom Industries
  PublisherName: Dycom Industries, Inc.
  InvoiceIssuerName: Dycom Industries, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - partner
  - name: project_hours
    unit: hour
    aggregation: sum
    dimensions:
      - engagement
principles:
  - name: Visibility
    description: Pull partner-invoice line items into FOCUS-formatted tables; no public billing API.
  - name: Allocation
    description: Tag any API consumption by engagement / project / business unit.
  - name: Optimization
    description: Renegotiate at contract renewal; consolidate volume across business units.
  - name: Accountability
    description: Engagement owner reviews invoice; flag deviations.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
